  <rect width="1600" height="700" fill="url(#bg)"/>
  <rect width="1600" height="700" fill="url(#words)"/>
  <rect width="1600" height="700" fill="url(#glow)"/>
  <circle cx="1370" cy="570" r="230" fill="#fff" opacity=".035"/>
  <circle cx="1450" cy="620" r="120" fill="#fff" opacity=".04"/>
