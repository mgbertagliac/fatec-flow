<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6f0e20"/>
      <stop offset="0.55" stop-color="#a71930"/>
      <stop offset="1" stop-color="#c43a50"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="18%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".17"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="words" width="520" height="250" patternUnits="userSpaceOnUse" patternTransform="rotate(-8)">
      <g fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-weight="800" letter-spacing="2">
        <text x="24" y="42" font-size="20" opacity=".10">PROVAS</text>
        <text x="175" y="42" font-size="13" opacity=".08">SEMINÁRIOS</text>
        <text x="355" y="42" font-size="17" opacity=".11">NOTAS</text>
        <text x="50" y="104" font-size="14" opacity=".09">PROJETOS</text>
        <text x="205" y="104" font-size="23" opacity=".11">PESQUISA</text>
        <text x="392" y="104" font-size="12" opacity=".08">AULAS</text>
        <text x="16" y="166" font-size="19" opacity=".10">ESTÁGIO</text>
        <text x="180" y="166" font-size="12" opacity=".08">TRABALHOS</text>
        <text x="345" y="166" font-size="22" opacity=".11">FORMATURA</text>
        <text x="78" y="226" font-size="13" opacity=".09">ENTREGAS</text>
